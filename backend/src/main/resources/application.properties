spring.application.name=backend
# 1. Database Connection Info
spring.datasource.url=jdbc:mysql://localhost:3306/ayusutra_db?createDatabaseIfNotExist=true
spring.datasource.username=root
# Replace 'YOUR_PASSWORD' with your actual MySQL password
spring.datasource.password=nihal

# 2. Hibernate Settings (The Translator)
# 'update' means Spring will automatically create tables for you in MySQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect